<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>facebook_clone_js</title>
</head>

<body>
    <div class="navbar">
        <div class="text-md text-brand-offwhite">
            <button id="nav-home" class="px-3 py02">Home</button>
            <button id="nav-profile" class="px-3 py-2">Profile</button>
        </div>
    </div>
    
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    <div id="home-view" class="view">
        <div class="grid-container">
            <div class="grid-item">
                <div class="SubmitCard">
                    <div class="text-brand-offwhite bg-brand-accent text-sm text-shadow-gray-900 text-center">
                        <div class="text-lg">
                            <input type="text" id="userInput" placeholder="Type Something...">
                        </div>

                        <div class="text-brand-offwhite text-sm text-shadow-gray-900 hover:text-black">
                            <button id="submitBtn">Post</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid-item">
                <div class="FeedCard">
                    <div class="bg-brand-accent text-brand-offwhite text-center">
                        <div id="displayFeed"></div>
                    </div>
                </div>
            </div>
        
            <div class="grid-item">
                <div class="ChatList">
                    <div class="bg-brand-accent3 text-shadow-black">
                        Chat List
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="profile-view">
        <!-- profile view here, make a profile page, uwu-->
    </div>
</body>

</html>
